<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — Chat</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <form id="register-form" class="auth-card" autocomplete="on">
      <h1>Create account</h1>
      <label for="r-email">Email</label>
      <input id="r-email" type="email" autocomplete="email" required>
      <label for="r-username">Username</label>
      <input id="r-username" autocomplete="username" required pattern="[A-Za-z0-9_.\-]{3,32}">
      <label for="r-password">Password (min 8 chars, at least 1 digit)</label>
      <input id="r-password" type="password" autocomplete="new-password" required minlength="8">
      <label for="r-password2">Confirm password</label>
      <input id="r-password2" type="password" autocomplete="new-password" required minlength="8">
      <div id="err" class="error"></div>
      <button type="submit">Create account</button>
      <div class="row">
        <a href="/">Already have an account? Sign in</a>
      </div>
    </form>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/pages/register.js"></script>
</body>
</html>
