<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in — Chat</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <form id="login-form" class="auth-card" autocomplete="on">
      <h1>Sign in</h1>
      <label for="login-id">Email or username</label>
      <input id="login-id" name="identifier" autocomplete="username" required>
      <label for="login-password">Password</label>
      <input id="login-password" name="password" type="password" autocomplete="current-password" required>
      <label class="inline-check"><input id="login-remember" type="checkbox" checked> Keep me signed in</label>
      <div id="err" class="error"></div>
      <button type="submit">Sign in</button>
      <div class="row">
        <a href="/register.html">Create account</a>
        <a href="/reset.html">Forgot password?</a>
      </div>
    </form>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/pages/login.js"></script>
</body>
</html>
